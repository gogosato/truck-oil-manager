const MAKERS = Object.keys(ENGINE_DB);
const STORAGE_KEY = "truck_fleet_v2";

function loadFleet() {
  try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : []; }
  catch { return []; }
}
function saveFleet(f) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(f)); } catch {} }

function App() {
  const [tab, setTab] = React.useState("lookup");
  const [fleet, setFleet] = React.useState(loadFleet);

  // 検索
  const [maker, setMaker] = React.useState("");
  const [engine, setEngine] = React.useState("");
  const [withFilter, setWithFilter] = React.useState(true);

  // 台帳追加
  const [showAdd, setShowAdd] = React.useState(false);
  const [addForm, setAddForm] = React.useState({ vin: "", nickname: "", maker: "", engine: "" });
  const [addError, setAddError] = React.useState("");

  // 交換記録
  const [recordTarget, setRecordTarget] = React.useState(null);
  const [recordDate, setRecordDate] = React.useState(new Date().toISOString().slice(0,10));
  const [recordMileage, setRecordMileage] = React.useState("");
  const [recordNote, setRecordNote] = React.useState("");
  const [recWithFilter, setRecWithFilter] = React.useState(true);

  const engineInfo = maker && engine ? ENGINE_DB[maker].engines[engine] : null;

  // ── 掲示板 ──
  const [posts, setPosts] = React.useState([]);
  const [boardName, setBoardName] = React.useState("");
  const [boardEngine, setBoardEngine] = React.useState("");
  const [boardText, setBoardText] = React.useState("");
  const [boardPosting, setBoardPosting] = React.useState(false);
  const [myPostIds, setMyPostIds] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem("myPostIds") || "[]"); } catch { return []; }
  });

  React.useEffect(() => {
    if (tab !== "board") return;
    const { db, ref, onValue } = window.__firebase || {};
    if (!db) return;
    const postsRef = ref(db, "posts");
    const unsub = onValue(postsRef, snap => {
      const val = snap.val();
      if (!val) { setPosts([]); return; }
      const arr = Object.entries(val)
        .map(([id, v]) => ({ id, ...v }))
        .sort((a, b) => b.ts - a.ts);
      setPosts(arr);
    });
    return () => unsub();
  }, [tab]);

  async function submitPost() {
    if (!boardText.trim()) return;
    const { db, ref, push } = window.__firebase || {};
    if (!db) return;
    setBoardPosting(true);
    try {
      const r = await push(ref(db, "posts"), {
        name: boardName.trim() || "名無し",
        engine: boardEngine,
        text: boardText.trim(),
        ts: Date.now()
      });
      const newIds = [...myPostIds, r.key];
      setMyPostIds(newIds);
      localStorage.setItem("myPostIds", JSON.stringify(newIds));
      setBoardText("");
    } catch(e) { alert("投稿に失敗しました: " + e.message); }
    setBoardPosting(false);
  }

  async function deletePost(id) {
    if (!window.confirm("この投稿を削除しますか？")) return;
    const { db, ref, remove } = window.__firebase || {};
    if (!db) return;
    try {
      await remove(ref(db, "posts/" + id));
      const newIds = myPostIds.filter(x => x !== id);
      setMyPostIds(newIds);
      localStorage.setItem("myPostIds", JSON.stringify(newIds));
    } catch(e) { alert("削除に失敗しました: " + e.message); }
  }
  const totalOil = engineInfo ? (engineInfo.oilL + (withFilter ? engineInfo.filterL : 0)).toFixed(1) : null;
  const totalOilMax = engineInfo && engineInfo.oilLMax ? (engineInfo.oilLMax + (withFilter ? engineInfo.filterL : 0)).toFixed(1) : null;
  const mc = maker ? ENGINE_DB[maker].color : "#333";
  const isUnconfirmed = (str) => str && (str.includes("要確認") || str.includes("推定"));

  function addTruck() {
    if (!addForm.vin.trim())  { setAddError("車体番号を入力してください"); return; }
    if (!addForm.maker)       { setAddError("メーカーを選択してください"); return; }
    if (!addForm.engine)      { setAddError("エンジン型式を選択してください"); return; }
    if (fleet.find(t => t.vin === addForm.vin.trim())) { setAddError("同じ車体番号が既に登録されています"); return; }
    const nf = [...fleet, { ...addForm, vin: addForm.vin.trim(), records: [] }];
    setFleet(nf); saveFleet(nf);
    setShowAdd(false); setAddForm({ vin:"", nickname:"", maker:"", engine:"" }); setAddError("");
  }

  function deleteTruck(vin) {
    if (!window.confirm(vin + " を削除しますか？")) return;
    const nf = fleet.filter(t => t.vin !== vin);
    setFleet(nf); saveFleet(nf);
  }

  function addRecord() {
    if (!recordDate || !recordTarget) return;
    const info = ENGINE_DB[recordTarget.maker].engines[recordTarget.engine];
    const oil = (info.oilL + (recWithFilter ? info.filterL : 0)).toFixed(1);
    const nf = fleet.map(t => t.vin !== recordTarget.vin ? t : {
      ...t, records: [...(t.records||[]), { date: recordDate, mileage: recordMileage, oil, withFilter: recWithFilter, note: recordNote }]
    });
    setFleet(nf); saveFleet(nf);
    setRecordTarget(null); setRecordMileage(""); setRecordNote("");
  }

  const latestRecord = t => t.records?.length ? t.records[t.records.length-1] : null;

  const S = {
    root:   { minHeight:"100vh", background:"#f4f5f7" },
    header: { background:"#1a1a2e", padding:"0 16px", position:"sticky", top:0, zIndex:100, boxShadow:"0 2px 8px rgba(0,0,0,.3)" },
    hInner: { maxWidth:960, margin:"0 auto", display:"flex", alignItems:"center", justifyContent:"space-between", height:58 },
    logoWrap:{ display:"flex", alignItems:"center", gap:10 },
    logoT:  { color:"#fff", fontWeight:800, fontSize:16, letterSpacing:1 },
    logoS:  { color:"#aaa", fontSize:9, letterSpacing:2 },
    nav:    { display:"flex", gap:6 },
    navBtn: { background:"transparent", color:"#ccc", border:"none", padding:"6px 14px", borderRadius:6, cursor:"pointer", fontSize:13, fontWeight:500 },
    navAct: { background:"#fff", color:"#1a1a2e", fontWeight:700 },
    main:   { maxWidth:960, margin:"24px auto", padding:"0 14px" },
    card:   { background:"#fff", borderRadius:14, padding:24, boxShadow:"0 2px 12px rgba(0,0,0,.08)", marginBottom:16 },
    title:  { fontSize:17, fontWeight:700, marginBottom:18, color:"#1a1a2e" },
    makerRow:{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:14 },
    mkBtn:  (m, sel) => ({ padding:"9px 16px", borderRadius:8, border:"2px solid "+ENGINE_DB[m].color,
              background: sel ? ENGINE_DB[m].color : "#f0f0f0", color: sel ? "#fff" : "#333",
              fontWeight:700, fontSize:13, cursor:"pointer" }),
    field:  { marginBottom:14 },
    label:  { display:"block", fontSize:12, fontWeight:600, color:"#555", marginBottom:5 },
    select: { width:"100%", padding:"9px 12px", border:"1.5px solid #ddd", borderRadius:8, fontSize:14, background:"#fafafa" },
    input:  { width:"100%", padding:"9px 12px", border:"1.5px solid #ddd", borderRadius:8, fontSize:14, background:"#fafafa" },
    chkRow: { display:"flex", alignItems:"center", gap:8, marginBottom:14, cursor:"pointer", fontSize:14 },
    result: (c) => ({ border:"2px solid "+c, borderRadius:12, padding:18, marginTop:8 }),
    badge:  (c) => ({ display:"inline-block", background:c, color:"#fff", borderRadius:6, padding:"3px 12px", fontSize:12, fontWeight:700, marginBottom:12 }),
    rRow:   { display:"flex", justifyContent:"space-between", alignItems:"center", padding:"7px 0", borderBottom:"1px solid #f0f0f0" },
    rLabel: { color:"#666", fontSize:13 },
    rVal:   { fontWeight:700, fontSize:15, color:"#1a1a2e", textAlign:"right", maxWidth:"60%" },
    rValSm: { fontWeight:600, fontSize:13, color:"#1a1a2e", textAlign:"right", maxWidth:"65%" },
    totBox: (c) => ({ background:c, borderRadius:10, padding:"12px 18px", display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:14 }),
    totLbl: { color:"rgba(255,255,255,0.85)", fontSize:13, fontWeight:600 },
    totNum: { color:"#fff", fontSize:28, fontWeight:800 },
    noteBox:{ background:"#fffbe6", border:"1px solid #ffe58f", borderRadius:8, padding:"10px 14px", marginTop:12, fontSize:12, color:"#7c5e00", lineHeight:1.6 },
    warn:   { background:"#fff2f0", border:"1px solid #ffccc7", borderRadius:8, padding:"8px 14px", marginTop:8, fontSize:11, color:"#a8071a" },
    unconfirmedBadge: { display:"inline-block", background:"#ff4d4f", color:"#fff", borderRadius:4, padding:"1px 6px", fontSize:10, fontWeight:700, marginLeft:6, verticalAlign:"middle" },
    oilRangeNote: { fontSize:11, color:"#7c5e00", marginTop:4, background:"#fffbe6", borderRadius:5, padding:"3px 8px", display:"inline-block" },
    elementNoAltRow: { fontSize:11, color:"#888", padding:"4px 0 6px", borderBottom:"1px solid #f0f0f0" },

    // 台帳
    ledgerHead: { display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 },
    addBtn: { background:"#1a1a2e", color:"#fff", border:"none", borderRadius:8, padding:"9px 18px", fontWeight:700, fontSize:13, cursor:"pointer" },
    empty:  { textAlign:"center", padding:"40px 20px", color:"#aaa" },
    grid:   { display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))", gap:14 },
    tCard:  { background:"#fff", borderRadius:12, overflow:"hidden", boxShadow:"0 2px 10px rgba(0,0,0,.07)" },
    tHead:  (c) => ({ background:c, padding:"12px 16px", display:"flex", justifyContent:"space-between", alignItems:"flex-start" }),
    tVin:   { color:"#fff", fontWeight:800, fontSize:14 },
    tNick:  { color:"rgba(255,255,255,0.8)", fontSize:11, marginTop:2 },
    tTag:   { background:"rgba(255,255,255,0.2)", color:"#fff", fontSize:10, fontWeight:700, padding:"2px 8px", borderRadius:4 },
    tBody:  { padding:"14px 16px" },
    tInfo:  { display:"flex", justifyContent:"space-between", alignItems:"center", padding:"5px 0", borderBottom:"1px solid #f5f5f5", fontSize:13 },
    tIL:    { color:"#888" },
    tIV:    { fontWeight:600, color:"#222" },
    tElm:   { fontSize:11, color:"#666", padding:"6px 0", borderBottom:"1px solid #f5f5f5" },
    lastRec:{ fontSize:11, color:"#888", margin:"8px 0 4px", background:"#f9f9f9", borderRadius:6, padding:"5px 8px" },
    actions:{ display:"flex", gap:8, marginTop:10 },
    actBtn: (c) => ({ flex:1, background:c, color:"#fff", border:"none", borderRadius:7, padding:"8px 0", fontWeight:700, fontSize:12, cursor:"pointer" }),
    delBtn: { background:"#fff", color:"#cc3333", border:"1.5px solid #cc3333", borderRadius:7, padding:"8px 14px", fontWeight:700, fontSize:12, cursor:"pointer" },
    histW:  { marginTop:10 },
    histS:  { fontSize:12, color:"#555", cursor:"pointer", padding:"4px 0" },
    tbl:    { width:"100%", borderCollapse:"collapse", marginTop:6, fontSize:12 },
    th:     { background:"#f5f5f5", padding:"5px 8px", textAlign:"left", fontWeight:600, color:"#555", borderBottom:"2px solid #eee" },
    td:     { padding:"5px 8px", borderBottom:"1px solid #f0f0f0", color:"#333" },

    // モーダル
    overlay:{ position:"fixed", inset:0, background:"rgba(0,0,0,.5)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:200, padding:"16px" },
    modal:  { background:"#fff", borderRadius:16, padding:24, width:"100%", maxWidth:480, maxHeight:"90vh", overflowY:"auto" },
    mTitle: { fontSize:17, fontWeight:800, marginBottom:18, color:"#1a1a2e" },
    mActs:  { display:"flex", gap:10, marginTop:20 },
    cancBtn:{ flex:1, background:"#f0f0f0", color:"#333", border:"none", borderRadius:8, padding:"11px 0", fontWeight:700, cursor:"pointer" },
    saveBtn:{ flex:2, background:"#1a1a2e", color:"#fff", border:"none", borderRadius:8, padding:"11px 0", fontWeight:700, cursor:"pointer" },
    error:  { color:"#cc3333", fontSize:12, marginTop:6, background:"#fff0f0", borderRadius:6, padding:"6px 10px" },
    infoBox:(c) => ({ background:c+"22", border:"1.5px solid "+c, borderRadius:8, padding:"10px 14px", marginBottom:14, fontWeight:700, color:c, fontSize:14 }),
  };

  return (
    <div style={S.root}>
      <header style={S.header}>
        <div style={S.hInner}>
          <div style={S.logoWrap}>
            <div>
              <div style={S.logoT}>🚚 オイル管理システム</div>
              <div style={S.logoS}>TRUCK OIL MANAGER</div>
            </div>
          </div>
          <nav style={S.nav}>
            {[["lookup","🔍 検索"],["fleet","📋 台帳"],["board","💬 掲示板"]].map(([k,v])=>(
              <button key={k} style={{...S.navBtn,...(tab===k?S.navAct:{})}} onClick={()=>setTab(k)}>{v}</button>
            ))}
          </nav>
        </div>
      </header>

      <div style={{background:"#fffbe6", borderBottom:"2px solid #ffe58f", padding:"10px 16px", textAlign:"center", fontSize:13, color:"#7c5e00"}}>
        ⚠ これはAIで作成したものです。おおまかな情報として使って下さい。
      </div>

      <main style={S.main}>
        {tab === "lookup" && (
          <div style={S.card}>
            <div style={S.title}>エンジン型式検索</div>

            <div style={S.field}>
              <label style={S.label}>メーカー</label>
              <div style={S.makerRow}>
                {MAKERS.map(m=>(
                  <button key={m} style={S.mkBtn(m, maker===m)} onClick={()=>{setMaker(m);setEngine("");}}>
                    {ENGINE_DB[m].label}
                  </button>
                ))}
              </div>
            </div>

            {maker && (
              <div style={S.field}>
                <label style={S.label}>エンジン型式</label>
                <select style={S.select} value={engine} onChange={e=>setEngine(e.target.value)}>
                  <option value="">-- 選択してください --</option>
                  {Object.entries(ENGINE_DB[maker].engines).map(([k,v])=>(
                    <option key={k} value={k}>{k}　{v.name}　{v.years ? `(${v.years})` : ""}</option>
                  ))}
                </select>
              </div>
            )}

            {engineInfo && (
              <div>
                <label style={{...S.chkRow, marginBottom:0}}>
                  <input type="checkbox" checked={withFilter} onChange={e=>setWithFilter(e.target.checked)} style={{width:17,height:17}}/>
                  オイルエレメント同時交換
                </label>

                <div style={S.result(mc)}>
                  <span style={S.badge(mc)}>{ENGINE_DB[maker].label} / {engine}</span>

                  <div style={S.rRow}>
                    <span style={S.rLabel}>車種</span>
                    <span style={S.rVal}>{engineInfo.name}</span>
                  </div>
                  <div style={S.rRow}>
                    <span style={S.rLabel}>製造年式</span>
                    <span style={S.rVal}>{engineInfo.years || "不明"}</span>
                  </div>
                  <div style={S.rRow}>
                    <span style={S.rLabel}>オイル量（ドレン抜き）</span>
                    <span style={S.rVal}>
                      {engineInfo.oilL.toFixed(1)} L
                      {engineInfo.oilLMax && <span style={S.oilRangeNote}>実測 〜{engineInfo.oilLMax.toFixed(1)} L（ゲージ確認必須）</span>}
                    </span>
                  </div>
                  {withFilter && (
                    <div style={S.rRow}>
                      <span style={S.rLabel}>エレメント交換時追加量</span>
                      <span style={S.rVal}>+ {engineInfo.filterL.toFixed(1)} L</span>
                    </div>
                  )}
                  <div style={S.rRow}>
                    <span style={S.rLabel}>推奨オイルグレード</span>
                    <span style={S.rVal}>{engineInfo.oilGrade}</span>
                  </div>
                  <div style={S.rRow}>
                    <span style={S.rLabel}>エレメント形式</span>
                    <span style={S.rValSm}>{engineInfo.elementType}</span>
                  </div>
                  <div style={S.rRow}>
                    <span style={S.rLabel}>純正品番</span>
                    <span style={S.rValSm}>
                      {isUnconfirmed(engineInfo.elementNo) && <span style={S.unconfirmedBadge}>🔴 要確認</span>}
                      {" "}{engineInfo.elementNo.replace("（要確認）","").replace("（要確認：","(").replace("）",")")}
                      {engineInfo.elementNoAlt && (
                        <div style={S.elementNoAltRow}>📎 候補: {engineInfo.elementNoAlt}</div>
                      )}
                    </span>
                  </div>
                  <div style={S.rRow}>
                    <span style={S.rLabel}>社外代替（参考）</span>
                    <span style={S.rValSm}>
                      {isUnconfirmed(engineInfo.altElement) && <span style={S.unconfirmedBadge}>🔴 要確認</span>}
                      {" "}{engineInfo.altElement}
                    </span>
                  </div>

                  <div style={S.totBox(mc)}>
                    <span style={S.totLbl}>{withFilter?"エレメント同時交換量":"オイルのみ交換量"}</span>
                    <span style={S.totNum}>
                      {totalOil} L{totalOilMax && <span style={{fontSize:14,fontWeight:600,marginLeft:6}}>〜 {totalOilMax} L</span>}
                    </span>
                  </div>

                  {engineInfo.note && (
                    <div style={S.noteBox}>
                      ⚠ {engineInfo.note}
                    </div>
                  )}
                  <div style={S.warn}>
                    ※ データは参考値です。実際の交換前に必ずオイルゲージで確認し、車両の取扱説明書に従ってください。
                  </div>
                </div>
              </div>
            )}
          </div>
        )}

        {tab === "fleet" && (
          <div style={S.card}>
            <div style={S.ledgerHead}>
              <div style={S.title}>車両台帳</div>
              <button style={S.addBtn} onClick={()=>setShowAdd(true)}>＋ 車両を追加</button>
            </div>
            {fleet.length===0 ? (
              <div style={S.empty}>
                <div style={{fontSize:44,marginBottom:10}}>🚚</div>
                <div style={{fontSize:15,color:"#888"}}>車両が登録されていません</div>
                <div style={{fontSize:12,color:"#aaa",marginTop:4}}>「＋ 車両を追加」から登録してください</div>
              </div>
            ) : (
              <div style={S.grid}>
                {fleet.map(truck=>{
                  const info = ENGINE_DB[truck.maker]?.engines[truck.engine];
                  if (!info) return null;
                  const last = latestRecord(truck);
                  const c = ENGINE_DB[truck.maker].color;
                  return (
                    <div key={truck.vin} style={S.tCard}>
                      <div style={S.tHead(c)}>
                        <div>
                          <div style={S.tVin}>{truck.vin}</div>
                          {truck.nickname && <div style={S.tNick}>{truck.nickname}</div>}
                        </div>
                        <div style={S.tTag}>{ENGINE_DB[truck.maker].label}</div>
                      </div>
                      <div style={S.tBody}>
                        <div style={S.tInfo}><span style={S.tIL}>エンジン</span><span style={S.tIV}>{truck.engine}</span></div>
                        <div style={S.tInfo}><span style={S.tIL}>オイル量</span><span style={{...S.tIV,color:c}}>{(info.oilL+info.filterL).toFixed(1)} L（E同時）</span></div>
                        <div style={S.tInfo}><span style={S.tIL}>グレード</span><span style={S.tIV}>{info.oilGrade}</span></div>
                        <div style={S.tElm}>
                          🔧 {info.elementType}　
                          {(info.elementNo.includes("要確認") || info.elementNo.includes("推定")) && <span style={S.unconfirmedBadge}>🔴 要確認</span>}
                          {" "}{info.elementNo.replace("（要確認）","").replace("（要確認：","(").replace("）",")")}
                        </div>
                        {last && (
                          <div style={S.lastRec}>
                            📅 前回: {last.date}　{last.oil}L{last.withFilter?" (E交換)":""}
                            {last.mileage && `　${parseInt(last.mileage).toLocaleString()} km`}
                          </div>
                        )}
                        <div style={S.actions}>
                          <button style={S.actBtn(c)} onClick={()=>{setRecordTarget(truck);setRecWithFilter(true);}}>交換記録</button>
                          <button style={S.delBtn} onClick={()=>deleteTruck(truck.vin)}>削除</button>
                        </div>
                        {truck.records?.length>0 && (
                          <details style={S.histW}>
                            <summary style={S.histS}>交換履歴 ({truck.records.length}回)</summary>
                            <table style={S.tbl}>
                              <thead><tr>
                                <th style={S.th}>日付</th>
                                <th style={S.th}>走行距離</th>
                                <th style={S.th}>油量</th>
                                <th style={S.th}>備考</th>
                              </tr></thead>
                              <tbody>
                                {[...truck.records].reverse().map((r,i)=>(
                                  <tr key={i} style={i%2===0?{background:"#fafafa"}:{}}>
                                    <td style={S.td}>{r.date}</td>
                                    <td style={S.td}>{r.mileage?`${parseInt(r.mileage).toLocaleString()} km`:"-"}</td>
                                    <td style={S.td}>{r.oil} L{r.withFilter?" ✓E":""}</td>
                                    <td style={S.td}>{r.note||"-"}</td>
                                  </tr>
                                ))}
                              </tbody>
                            </table>
                          </details>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}
      </main>

      {/* 車両追加モーダル */}
      {showAdd && (
        <div style={S.overlay} onClick={()=>setShowAdd(false)}>
          <div style={S.modal} onClick={e=>e.stopPropagation()}>
            <div style={S.mTitle}>車両を追加</div>
            <div style={S.field}>
              <label style={S.label}>車体番号 *</label>
              <input style={S.input} placeholder="例: 2KG-FRR90S2" value={addForm.vin} onChange={e=>setAddForm({...addForm,vin:e.target.value})}/>
            </div>
            <div style={S.field}>
              <label style={S.label}>車両名・愛称（任意）</label>
              <input style={S.input} placeholder="例: 1号車" value={addForm.nickname} onChange={e=>setAddForm({...addForm,nickname:e.target.value})}/>
            </div>
            <div style={S.field}>
              <label style={S.label}>メーカー *</label>
              <div style={S.makerRow}>
                {MAKERS.map(m=>(
                  <button key={m} style={S.mkBtn(m, addForm.maker===m)} onClick={()=>setAddForm({...addForm,maker:m,engine:""})}>
                    {ENGINE_DB[m].label}
                  </button>
                ))}
              </div>
            </div>
            {addForm.maker && (
              <div style={S.field}>
                <label style={S.label}>エンジン型式 *</label>
                <select style={S.select} value={addForm.engine} onChange={e=>setAddForm({...addForm,engine:e.target.value})}>
                  <option value="">-- 選択してください --</option>
                  {Object.entries(ENGINE_DB[addForm.maker].engines).map(([k,v])=>(
                    <option key={k} value={k}>{k}　{v.name}　{v.years ? `(${v.years})` : ""}</option>
                  ))}
                </select>
              </div>
            )}
            {addError && <div style={S.error}>{addError}</div>}
            <div style={S.mActs}>
              <button style={S.cancBtn} onClick={()=>{setShowAdd(false);setAddError("");}}>キャンセル</button>
              <button style={S.saveBtn} onClick={addTruck}>登録する</button>
            </div>
          </div>
        </div>
      )}

      {/* 交換記録モーダル */}
      {recordTarget && (
        <div style={S.overlay} onClick={()=>setRecordTarget(null)}>
          <div style={S.modal} onClick={e=>e.stopPropagation()}>
            <div style={S.mTitle}>オイル交換記録</div>
            <div style={S.infoBox(ENGINE_DB[recordTarget.maker].color)}>
              {recordTarget.vin}{recordTarget.nickname && `（${recordTarget.nickname}）`}
            </div>
            <div style={S.field}>
              <label style={S.label}>交換日 *</label>
              <input type="date" style={S.input} value={recordDate} onChange={e=>setRecordDate(e.target.value)}/>
            </div>
            <div style={S.field}>
              <label style={S.label}>走行距離（km）</label>
              <input type="number" style={S.input} placeholder="例: 125000" value={recordMileage} onChange={e=>setRecordMileage(e.target.value)}/>
            </div>
            <label style={S.chkRow}>
              <input type="checkbox" checked={recWithFilter} onChange={e=>setRecWithFilter(e.target.checked)} style={{width:17,height:17}}/>
              オイルエレメント同時交換
            </label>
            <div style={S.field}>
              <label style={S.label}>備考</label>
              <input style={S.input} placeholder="例: 次回 130,000km" value={recordNote} onChange={e=>setRecordNote(e.target.value)}/>
            </div>
            {(() => {
              const info = ENGINE_DB[recordTarget.maker].engines[recordTarget.engine];
              const oil = (info.oilL + (recWithFilter ? info.filterL : 0)).toFixed(1);
              const c = ENGINE_DB[recordTarget.maker].color;
              return (
                <div>
                  <div style={S.totBox(c)}>
                    <span style={S.totLbl}>交換オイル量</span>
                    <span style={S.totNum}>{oil} L</span>
                  </div>
                  {recWithFilter && (
                    <div style={{marginTop:8, fontSize:12, color:"#666"}}>
                      エレメント: {info.elementType}　{info.elementNo}
                    </div>
                  )}
                </div>
              );
            })()}
            <div style={S.mActs}>
              <button style={S.cancBtn} onClick={()=>setRecordTarget(null)}>キャンセル</button>
              <button style={S.saveBtn} onClick={addRecord}>記録する</button>
            </div>
          </div>
        </div>
      )}

      {tab === "board" && (
        <div style={S.card}>
          <div style={S.title}>💬 掲示板</div>
          <p style={{fontSize:13,color:"#666",marginBottom:16}}>整備メモ・気づき・情報共有など自由にどうぞ。リンクを知っている人全員が閲覧・投稿できます。</p>

          {/* 投稿フォーム */}
          <div style={{background:"#f8f8f8",borderRadius:10,padding:16,marginBottom:20}}>
            <div style={{display:"flex",gap:8,marginBottom:8,flexWrap:"wrap"}}>
              <input
                placeholder="ニックネーム（省略可）"
                value={boardName}
                onChange={e=>setBoardName(e.target.value)}
                style={{flex:1,minWidth:120,padding:"8px 10px",borderRadius:6,border:"1px solid #ddd",fontSize:13}}
              />
              <select
                value={boardEngine}
                onChange={e=>setBoardEngine(e.target.value)}
                style={{flex:1,minWidth:140,padding:"8px 10px",borderRadius:6,border:"1px solid #ddd",fontSize:13,background:"#fff"}}
              >
                <option value="">エンジン（省略可）</option>
                {Object.entries(ENGINE_DB).map(([mk,mv])=>
                  Object.entries(mv.engines).map(([ek,ev])=>(
                    <option key={mk+ek} value={ev.name}>{ev.name}</option>
                  ))
                )}
              </select>
            </div>
            <textarea
              placeholder="コメントを入力..."
              value={boardText}
              onChange={e=>setBoardText(e.target.value)}
              rows={3}
              style={{width:"100%",padding:"8px 10px",borderRadius:6,border:"1px solid #ddd",fontSize:13,resize:"vertical",boxSizing:"border-box"}}
            />
            <div style={{textAlign:"right",marginTop:8}}>
              <button
                onClick={submitPost}
                disabled={boardPosting||!boardText.trim()}
                style={{padding:"8px 20px",borderRadius:6,border:"none",background:"#1a73e8",color:"#fff",fontWeight:"bold",fontSize:13,cursor:"pointer",opacity:(boardPosting||!boardText.trim())?0.5:1}}
              >{boardPosting?"投稿中...":"投稿する"}</button>
            </div>
          </div>

          {/* 投稿一覧 */}
          <div style={{fontWeight:"bold",fontSize:14,marginBottom:12}}>{posts.length}件の投稿</div>
          {posts.length === 0 ? (
            <div style={{textAlign:"center",padding:32,color:"#bbb"}}>まだ投稿がありません</div>
          ) : (
            posts.map(p=>(
              <div key={p.id} style={{borderBottom:"1px solid #eee",padding:"12px 4px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                  <div>
                    <span style={{fontWeight:"bold",fontSize:13}}>{p.name}</span>
                    {p.engine && <span style={{marginLeft:8,fontSize:11,background:"#e8f0fe",color:"#1a73e8",padding:"2px 7px",borderRadius:10}}>{p.engine}</span>}
                    <span style={{marginLeft:8,fontSize:11,color:"#aaa"}}>{new Date(p.ts).toLocaleString("ja-JP",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"})}</span>
                  </div>
                  {myPostIds.includes(p.id) && (
                    <button onClick={()=>deletePost(p.id)} style={{fontSize:11,padding:"2px 8px",borderRadius:5,border:"1px solid #ffcdd2",background:"#fff5f5",color:"#c62828",cursor:"pointer"}}>削除</button>
                  )}
                </div>
                <div style={{fontSize:13,color:"#333",whiteSpace:"pre-wrap",lineHeight:1.6}}>{p.text}</div>
              </div>
            ))
          )}
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
