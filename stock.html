const STORAGE_KEY = 'ai_stock_portfolio_v2';

function loadConfig() {
  try {
    const r = localStorage.getItem(STORAGE_KEY);
    return r ? JSON.parse(r) : { investmentJPY: 1000000 };
  } catch { return { investmentJPY: 1000000 }; }
}
function saveConfig(c) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(c)); } catch {} }

// 初期シミュレーション価格を生成
function initPrices() {
  const prices = {};
  STOCKS.forEach(s => {
    const dayVar = (Math.random() - 0.45) * 0.04;
    const current = s.basePrice * (1 + dayVar);
    const yestVar = (Math.random() - 0.45) * 0.025;
    const yesterday = s.basePrice * (1 + yestVar);
    prices[s.symbol] = { current, yesterday };
  });
  return prices;
}

// ランダムウォークで価格を更新
function tickPrices(prev) {
  const next = {};
  STOCKS.forEach(s => {
    const prevPrice = prev[s.symbol]?.current ?? s.basePrice;
    const change = (Math.random() - 0.49) * 0.006;
    next[s.symbol] = {
      current: prevPrice * (1 + change),
      yesterday: prev[s.symbol]?.yesterday ?? s.basePrice,
    };
  });
  return next;
}

// ──────────────────────── フォーマット関数 ────────────────────────
function fmtJPY(n) {
  const abs = Math.abs(n);
  if (abs >= 100000000) return `${(n / 100000000).toFixed(2)}億円`;
  if (abs >= 10000)     return `${(n / 10000).toFixed(1)}万円`;
  return `${Math.round(n).toLocaleString('ja-JP')}円`;
}
function fmtSign(n) { return (n >= 0 ? '+' : '') + fmtJPY(n); }
function fmtPct(n)  { return (n >= 0 ? '+' : '') + n.toFixed(2) + '%'; }

// ──────────────────────── ポートフォリオ計算 ────────────────────────
function calcMetrics(stocks, prices, totalInvested) {
  let totalCurrentJPY = 0;
  let totalDailyPnlJPY = 0;

  const metrics = stocks.map(s => {
    const price = prices[s.symbol];
    const currentRaw = price?.current ?? s.basePrice;
    const yesterdayRaw = price?.yesterday ?? s.basePrice;

    const toJPY = (p, hist = false) => s.currency === 'USD' ? p * (hist ? USD_JPY_HIST : USD_JPY) : p;

    const purchasePriceJPY = toJPY(s.purchasePrice, true);
    const currentPriceJPY  = toJPY(currentRaw);
    const yesterdayPriceJPY = toJPY(yesterdayRaw);

    const allocated = totalInvested * (s.allocation / 100);
    const shares = allocated / purchasePriceJPY;
    const currentValue = shares * currentPriceJPY;
    const pnl = currentValue - allocated;
    const pnlPct = (pnl / allocated) * 100;
    const dailyChangePct = ((currentPriceJPY - yesterdayPriceJPY) / yesterdayPriceJPY) * 100;
    const dailyPnl = shares * (currentPriceJPY - yesterdayPriceJPY);

    totalCurrentJPY += currentValue;
    totalDailyPnlJPY += dailyPnl;

    return { ...s, currentRaw, purchasePriceJPY, currentPriceJPY, allocated, shares, currentValue, pnl, pnlPct, dailyChangePct, dailyPnl };
  });

  const totalPnl = totalCurrentJPY - totalInvested;
  const totalPnlPct = (totalPnl / totalInvested) * 100;
  const dailyPct = (totalDailyPnlJPY / totalCurrentJPY) * 100;

  return { metrics, totalCurrentJPY, totalPnl, totalPnlPct, totalDailyPnlJPY, dailyPct };
}

    );
  }

  // ─── 銘柄カード一覧 ───
  function StockCards() {
    return (
      <div style={S.sGrid}>
        {metrics.map(m => (
          <div key={m.symbol} style={S.sCard(m.pnl)}>
            <div style={S.sHead}>
              <div>
                <div style={S.sName}>{m.icon} {m.name}</div>
                <div style={S.sSym}>{m.flag} {m.symbol} · {m.sector}</div>
              </div>
              <span style={S.risk(m.riskColor)}>リスク{m.risk}</span>
            </div>

            <div style={S.sPrice}>
              {m.currency === 'USD'
                ? `$${m.currentRaw.toFixed(2)}`
                : `¥${Math.round(m.currentRaw).toLocaleString('ja-JP')}`}
            </div>

            {m.currency === 'USD' && (
              <div style={S.sSub}>≈ ¥{Math.round(m.currentRaw * USD_JPY).toLocaleString('ja-JP')}</div>
            )}

            <div style={{...S.badge(m.dailyChangePct>=0?G+'22':R+'22', m.dailyChangePct>=0?G:R), border:`1px solid ${m.dailyChangePct>=0?G:R}44`, marginBottom:12}}>
              {m.dailyChangePct>=0?'▲':'▼'} 前日比 {Math.abs(m.dailyChangePct).toFixed(2)}%
            </div>

            <div style={S.sDivider}>
              <div style={S.sRow}>
                <span style={S.sLbl}>購入単価</span>
                <span>{m.currency==='USD'?`$${m.purchasePrice.toFixed(2)}`:`¥${Math.round(m.purchasePrice).toLocaleString('ja-JP')}`}</span>
              </div>
              <div style={S.sRow}>
                <span style={S.sLbl}>投資額</span>
                <span>{fmtJPY(m.allocated)}</span>
              </div>
              <div style={S.sRow}>
                <span style={S.sLbl}>評価額</span>
                <span style={{color:'#e6edf3',fontWeight:600}}>{fmtJPY(m.currentValue)}</span>
              </div>
              <div style={{...S.sRow, marginTop: 4}}>
                <span style={S.sLbl}>本日の損益</span>
                <span style={{color:m.dailyChangePct>=0?G:R,fontWeight:600}}>{fmtSign(m.dailyPnl)}</span>
              </div>
              <div style={S.sPnlRow}>
                <span>含み損益</span>
                <span style={{color:m.pnl>=0?G:R}}>
                  {fmtSign(m.pnl)} ({fmtPct(m.pnlPct)})
                </span>
              </div>
            </div>

            <div style={{marginTop:10,fontSize:11,color:'#8b949e'}}>
              配分 {m.allocation}% · 保有株数 {m.shares.toFixed(m.currency==='USD'?4:1)}株
            </div>
          </div>
        ))}
      </div>
    );
  }

  // ─── AI の理由 ───
  function AIReason() {
    return (
      <>
        <div style={S.aiCard}>
          <span style={{fontSize:36,flexShrink:0}}>🤖</span>
          <div>
            <div style={S.aiTitle}>AIがすべて管理 — あなたは見るだけでOK</div>
            <div style={S.aiDesc}>
              このポートフォリオは AI が厳選した 8 銘柄で構成されています。
              AI・テクノロジーセクターを中心に、日本株と米国株をバランスよく組み合わせることで
              成長性とリスク分散を両立しています。価格は30秒ごとに自動更新されます。<br/>
              <strong style={{color:GOLD}}>あなたがすることは、このページを開いて確認するだけです。</strong>
            </div>
          </div>
        </div>

        {metrics.map(m => (
          <div key={m.symbol} style={S.card}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12,flexWrap:'wrap',gap:8}}>
              <div style={{display:'flex',gap:10,alignItems:'center'}}>
                <span style={{fontSize:28}}>{m.icon}</span>
                <div>
                  <div style={{fontWeight:800,fontSize:15}}>{m.flag} {m.name}</div>
                  <div style={{color:'#8b949e',fontSize:12,marginTop:2}}>{m.symbol} · {m.sector}</div>
                </div>
              </div>
              <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                <span style={S.risk(m.riskColor)}>リスク{m.risk}</span>
                <span style={{...S.badge(GOLD+'22', GOLD),border:`1px solid ${GOLD}44`}}>配分 {m.allocation}%</span>
                <span style={{...S.badge(m.pnl>=0?G+'22':R+'22', m.pnl>=0?G:R),border:`1px solid ${m.pnl>=0?G:R}44`}}>
                  {fmtPct(m.pnlPct)}
                </span>
              </div>
            </div>

            {/* AI スコア */}
            <div style={S.scoreWrap}>
              <span style={{fontSize:11,color:'#8b949e',flexShrink:0}}>AI スコア</span>
              <div style={S.scoreBar}>
                <div style={S.scoreFill(m.aiScore)} />
              </div>
              <span style={{fontWeight:800,fontSize:14,color:m.aiScore>=88?G:m.aiScore>=75?GOLD:R,flexShrink:0}}>{m.aiScore}/100</span>
            </div>

            {/* 理由（クリックで展開） */}
            <div
              style={{cursor:'pointer',color:GOLD,fontSize:13,fontWeight:600,display:'flex',alignItems:'center',gap:6}}
              onClick={() => setExpandedAI(expandedAI===m.symbol ? null : m.symbol)}
            >
              💡 AIが選んだ理由 {expandedAI===m.symbol ? '▲' : '▼'}
            </div>
            {expandedAI === m.symbol && (
              <div style={S.reasonBox}>{m.reason}</div>
            )}
          </div>
        ))}
      </>
    );
  }

  // ─── メインレンダー ───
  return (
    <div style={S.root}>

      {/* ヘッダー */}
      <header style={S.header}>
        <div style={S.hInner}>
          <div style={S.logo}>
            <span style={{fontSize:26}}>📈</span>
            <div>
              <div style={S.logoT}>AI 株式ポートフォリオ</div>
              <div style={S.logoS}>AI STOCK PORTFOLIO MANAGER</div>
            </div>
          </div>
          <nav style={S.nav}>
            {[['dashboard','📊 ダッシュボード'],['stocks','💼 銘柄一覧'],['ai','🤖 AIの理由']].map(([k,v]) => (
              <button key={k} style={{...S.navBtn,...(tab===k?S.navAct:{})}} onClick={()=>setTab(k)}>{v}</button>
            ))}
          </nav>
        </div>
      </header>

      {/* ティッカーバー */}
      <div style={S.ticker}>
        {metrics.map(m => (
          <span key={m.symbol} style={{whiteSpace:'nowrap'}}>
            {m.flag} {m.symbol} &nbsp;
            <span style={{fontWeight:700,color:m.dailyChangePct>=0?G:R}}>
              {m.currency==='USD'?`$${m.currentRaw.toFixed(2)}`:`¥${Math.round(m.currentRaw).toLocaleString()}`}
              {' '}({m.dailyChangePct>=0?'+':''}{m.dailyChangePct.toFixed(2)}%)
            </span>
          </span>
        ))}
        <span style={{color:'#30363d'}}>|</span>
        <span>🕒 {lastUpdate.toLocaleTimeString('ja-JP')}</span>
        <span>💱 1USD = ¥{USD_JPY.toFixed(0)}</span>
        <span
          style={{color:GOLD,cursor:'pointer',fontWeight:700}}
          onClick={() => setShowModal(true)}
        >
          ⚙ 投資額設定
        </span>
      </div>

      {/* コンテンツ */}
      <main style={S.main}>
        {tab === 'dashboard' && <Dashboard />}
        {tab === 'stocks'    && <StockCards />}
        {tab === 'ai'        && <AIReason />}
      </main>

      {/* 投資額設定モーダル */}
      {showModal && (
        <div style={S.overlay} onClick={()=>setShowModal(false)}>
          <div style={S.modal} onClick={e=>e.stopPropagation()}>
            <div style={S.mTitle}>⚙ 投資額の設定</div>
            <div style={S.mDesc}>
              投資するお金の合計額（円）を入力してください。<br/>
              AI が 8 銘柄に自動で配分します。<br/>
              <strong style={{color:GOLD}}>現在: {fmtJPY(config.investmentJPY)}</strong>
            </div>
            <div style={{marginBottom:6,fontSize:12,color:'#8b949e'}}>投資総額（円）</div>
            <input
              style={S.mInput}
              type="number"
              placeholder="例: 1000000（100万円）"
              value={investInput}
              onChange={e=>setInvestInput(e.target.value)}
            />
            <div style={{fontSize:11,color:'#8b949e',marginTop:8}}>
              ※ 実際に株を購入するわけではありません。シミュレーションです。
            </div>
            <div style={S.mBtns}>
              <button style={S.mCancel} onClick={()=>{setShowModal(false);setInvestInput('');}}>キャンセル</button>
              <button style={S.mSave} onClick={()=>{
                const v = parseInt(investInput);
                if(v > 0) { const nc={...config,investmentJPY:v}; setConfig(nc); saveConfig(nc); }
                setShowModal(false); setInvestInput('');
              }}>設定する</button>
            </div>
          </div>
        </div>
      )}

      {/* フッター */}
      <footer style={S.footer}>
        ⚠ 本アプリの価格はデモ用シミュレーションです（実際の市場価格ではありません）。<br/>
        投資にはリスクが伴います。実際に株を購入する際は証券会社・ファイナンシャルアドバイザーにご相談ください。<br/>
        AI の推奨はあくまで参考情報です。投資は自己責任でお願いします。
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
